name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Required checks (branch protection): enable job "ci" on master.
# Settings → Branches → Branch protection → Require status checks → "ci"

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (judge + obstacles + observability)
        run: npm test
