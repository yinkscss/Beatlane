# A string used to distinguish different Supabase projects on the same host. Defaults to the
# working directory name when running `supabase init`.
project_id = "beatlane"

[api]
enabled = true

[db]
major_version = 15

[studio]
enabled = true

[auth]
enabled = true

[storage]
enabled = true

[functions.hello]
verify_jwt = true

[functions.magic-profile]
# Magic DID Bearer token — not a Supabase JWT
verify_jwt = false

[functions.record-purchase]
# Magic DID Bearer token — not a Supabase JWT
verify_jwt = false

[functions.my-unlocks]
# Magic DID Bearer token — not a Supabase JWT
verify_jwt = false

[functions.resolve-chart-assets]
# Public charts OK without auth; paid uses Magic DID
verify_jwt = false

[functions.daily-challenge]
# Magic DID Bearer token — not a Supabase JWT
verify_jwt = false

[functions.submit-run]
# Magic DID Bearer token — not a Supabase JWT
verify_jwt = false

[functions.leaderboard]
# Optional Magic DID for "you" row; board is public poll
verify_jwt = false
